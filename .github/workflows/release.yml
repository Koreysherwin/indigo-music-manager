name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Create plugin zip
      run: |
        cd MusicManager.indigoPlugin
        zip -r ../MusicManager-v${{ steps.get_version.outputs.VERSION }}.indigoPlugin.zip .
        
    - name: Extract changelog
      id: changelog
      run: |
        # Extract the latest version's changelog
        sed -n '/## \[/,/## \[/p' CHANGELOG.md | sed '$d' > release_notes.md
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: MusicManager-v${{ steps.get_version.outputs.VERSION }}.indigoPlugin.zip
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
